server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ─────────────────────────────────────────────────────
    # All requests to /api/ are forwarded to the API container.
    # The service name "api" resolves via Docker's internal DNS.
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Give the API enough time for long-running operations (PDF parse, LLM calls)
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;

        # Increase buffer sizes for large API responses (e.g. report dashboards)
        proxy_buffer_size          16k;
        proxy_buffers              8 32k;
        proxy_busy_buffers_size    64k;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # Return index.html for any path not matched above so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    # Vite hashes filenames on build, so these assets can be cached indefinitely.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
