services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ledger
      POSTGRES_USER:     ledger
      POSTGRES_PASSWORD: ledger_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once on empty volume — role required by initial_schema_with_rls migration
      - ./docker/postgres/init-01-app-service-role.sql:/docker-entrypoint-initdb.d/01-app-service-role.sql
    # Port 5432 exposed to host for local dev — admin engine and Alembic connect directly.
    # Admin access: docker compose exec db psql -U ledger ledger
    # Exposed on 5433 to avoid conflict with any local PostgreSQL on port 5432.
    ports:
      - "5433:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout:  5s
      retries:  10
      start_period: 10s

  # ── PgBouncer (connection pooler) ────────────────────────────────────────────
  # Sits between the API and PostgreSQL.
  # Multiplexes many short-lived app connections → a small fixed pool of server connections.
  # Transaction-mode pooling: safe with asyncpg (statement_cache_size=0) and SET LOCAL RLS vars.
  #
  # Connection flow:
  #   api (pool_size=5, max_overflow=10) → pgbouncer:6432 → db:5432
  #   admin engine                       → db:5432  (bypasses pgbouncer — DDL / migrations)
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Backend PostgreSQL connection ──────────────────────────────────────
      DB_HOST:     db
      DB_PORT:     "5432"
      DB_NAME:     ledger
      DB_USER:     ledger
      DB_PASSWORD: ledger_secret
      # ── Pooling ────────────────────────────────────────────────────────────
      # transaction mode: safe with asyncpg (statement_cache_size=0) and SET LOCAL RLS vars
      POOL_MODE:              transaction
      MAX_CLIENT_CONN:        "200"
      DEFAULT_POOL_SIZE:      "10"
      MIN_POOL_SIZE:          "2"
      RESERVE_POOL_SIZE:      "2"
      RESERVE_POOL_TIMEOUT:   "3"
      # ── Lifecycle ──────────────────────────────────────────────────────────
      SERVER_LIFETIME:         "3600"
      SERVER_IDLE_TIMEOUT:     "600"
      SERVER_CONNECT_TIMEOUT:  "10"
      QUERY_WAIT_TIMEOUT:      "30"
      # ── Auth ───────────────────────────────────────────────────────────────
      AUTH_TYPE:    plain
      # ── Listen ─────────────────────────────────────────────────────────────
      # edoburu defaults to port 5432 inside the container; set 6432 to match
      # the DATABASE_URL used by the api service and the host port mapping below.
      LISTEN_PORT:  "6432"
      LISTEN_ADDR:  "*"
      # ── TLS ────────────────────────────────────────────────────────────────
      # Both containers share a private Docker bridge network — SSL not needed here.
      # PgBouncer → PostgreSQL also on private network; enable SERVER_TLS_SSLMODE=require
      # for any deployment where PostgreSQL is reachable over a public network.
      CLIENT_TLS_SSLMODE: disable
      SERVER_TLS_SSLMODE: disable
      # ── Logging ────────────────────────────────────────────────────────────
      LOG_CONNECTIONS:    "0"
      LOG_DISCONNECTIONS: "0"
      STATS_PERIOD:       "60"
    ports:
      - "6432:6432"
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "6432"]
      interval: 5s
      timeout:  5s
      retries:  10
      start_period: 5s

  # ── API Server (FastAPI + Uvicorn) ───────────────────────────────────────────
  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      # app traffic → PgBouncer → PostgreSQL (RLS enforced, SSL disabled on private network)
      DATABASE_URL:       postgresql+asyncpg://ledger:ledger_secret@pgbouncer:6432/ledger
      # admin / migrations → PostgreSQL directly (bypasses PgBouncer — DDL needs a stable session)
      ADMIN_DATABASE_URL: postgresql+asyncpg://ledger:ledger_secret@db:5432/ledger
      APP_ENV:         production
      APP_HOST:        ${APP_HOST:-0.0.0.0}
      APP_PORT:        "8000"
      APP_DEBUG:       "false"
      # Change this to a long random string before going to production
      SECRET_KEY:      change-me-before-going-to-production
      ALLOWED_ORIGINS: "http://localhost,http://localhost:80"
      # Optional: uncomment and fill in to enable LLM features
      # GEMINI_API_KEY:     your-key-here
      # OPENAI_API_KEY:     your-key-here
      # ANTHROPIC_API_KEY:  your-key-here
    ports:
      - "8000:8000"

  # ── Web Server (Nginx + React SPA) ───────────────────────────────────────────
  web:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"


volumes:
  postgres_data:
