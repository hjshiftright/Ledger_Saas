[databases]
; Route all app_service traffic to PostgreSQL.
; PgBouncer resolves "db" via the Docker bridge network (docker-compose service name).
ledger = host=db port=5432 dbname=ledger

[pgbouncer]
; ── Networking ────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

; ── Startup parameters ───────────────────────────────────────────────────────
; PgBouncer only recognises a small whitelist of startup parameters by default.
; Any parameter not in that whitelist triggers a ProtocolViolationError unless
; listed here. "jit" is sent by the asyncpg engine to disable JIT on app
; connections; "extra_float_digits" is commonly sent by JDBC/psycopg drivers.
ignore_startup_parameters = extra_float_digits,jit

; ── Pooling mode ─────────────────────────────────────────────────────────────
; MUST be transaction mode:
;   - Enables N-app-connections → M-server-connections multiplexing
;   - Compatible with asyncpg (statement_cache_size=0 set on engine side)
;   - Compatible with SET LOCAL / is_local=TRUE used for RLS tenant context
pool_mode = transaction

; ── Connection limits ─────────────────────────────────────────────────────────
max_client_conn = 200          ; Accept up to 200 client-side connections (app → pgbouncer)
default_pool_size = 10         ; Max real PostgreSQL server connections per (user, database)
reserve_pool_size = 2          ; Emergency extra connections for traffic bursts
reserve_pool_timeout = 3.0     ; Seconds to wait before tapping into the reserve pool
min_pool_size = 2              ; Keep at least 2 warm server connections (avoids cold-start latency)

; ── Server connection lifecycle ───────────────────────────────────────────────
server_lifetime = 3600         ; Recycle a server connection after 1 hour
server_idle_timeout = 600      ; Close idle server connections after 10 minutes
server_connect_timeout = 10    ; Fail fast if PostgreSQL is unreachable
server_login_retry = 15        ; Retry interval (seconds) when PostgreSQL login fails

; ── Client connection lifecycle ───────────────────────────────────────────────
client_idle_timeout = 0        ; Do not force-close idle client connections (app pool handles this)
query_wait_timeout = 30        ; Return error to client if no server conn available within 30s

; ── Authentication ────────────────────────────────────────────────────────────
; plain: passwords stored as plaintext in userlist.txt — acceptable for private
; Docker networks. Switch to scram-sha-256 for any internet-exposed deployment.
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

; ── TLS — client side (app → pgbouncer) ─────────────────────────────────────
; Both containers are on the same Docker private bridge network.
; Traffic never leaves the host machine — SSL adds CPU overhead with zero benefit.
client_tls_sslmode = disable

; ── TLS — server side (pgbouncer → PostgreSQL) ───────────────────────────────
; Also on the same Docker private network.
; Enable server_tls_sslmode = require for production deployments outside a VPC.
server_tls_sslmode = disable

; ── Logging ───────────────────────────────────────────────────────────────────
log_connections = 0            ; Do not log every connection event (high volume)
log_disconnections = 0
log_pooler_errors = 1          ; Log pool-level errors (query_wait_timeout hits, etc.)
stats_period = 60              ; Emit pool statistics to log every 60 seconds

; ── Admin console ─────────────────────────────────────────────────────────────
; Connect with: psql -h <host> -p 6432 -U pgbouncer pgbouncer
; Useful commands: SHOW POOLS; SHOW STATS; SHOW SERVERS; SHOW CLIENTS; RELOAD;
admin_users = pgbouncer
stats_users = ledger
