<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger - Option E: Visual Topology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fbfbfb; 
            color: #1e293b;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .canvas-bg {
            background-image: 
                radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
            cursor: crosshair;
        }

        .node {
            position: absolute;
            width: 180px;
            padding: 16px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: grab;
            user-select: none;
            z-index: 10;
        }
        .node:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-color: #cbd5e1; }
        .node:active { cursor: grabbing; }

        .node-asset { border-left: 6px solid #10b981; }
        .node-liab { border-left: 6px solid #ef4444; }
        .node-hub { border: 3px solid #6366f1; width: 220px; z-index: 20; background: #EEF2FF; }

        .connection-line {
            position: absolute;
            height: 2px;
            background: #cbd5e1;
            transform-origin: 0 50%;
            z-index: 5;
            pointer-events: none;
        }

        .toolbar {
            position: fixed;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .tool-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: #64748b;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .tool-btn:hover { background: #6366f1; color: white; border-color: #6366f1; }

        .ai-fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: #6366f1;
            color: white;
            padding: 16px 24px;
            border-radius: 100px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            z-index: 100;
        }

        .setup-complete {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
        }

        .clipping-path {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body class="canvas-bg overflow-hidden" id="canvas">

    <!-- Header Overlay -->
    <div class="fixed top-8 left-8 z-100">
        <h1 class="text-2xl font-black text-slate-800 tracking-tighter">Ledger Topology.</h1>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-1">Scenario: Complex Trust / Family Office</p>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <button class="tool-btn" title="Add Asset Account" onclick="addNode('asset')"><i class="fas fa-plus-circle text-emerald-500"></i></button>
        <button class="tool-btn" title="Add Liability" onclick="addNode('liab')"><i class="fas fa-minus-circle text-rose-500"></i></button>
        <button class="tool-btn" title="Clear Canvas" onclick="location.reload()"><i class="fas fa-trash-can"></i></button>
        <div class="h-px bg-slate-200 w-full mx-auto"></div>
        <button class="tool-btn" title="AI Auto-Layout"><i class="fas fa-wand-sparkles text-violet-500"></i></button>
    </div>

    <!-- Setup Control -->
    <div class="setup-complete">
        <button class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-xl shadow-indigo-100 hover:bg-black transition-all" onclick="finish()">Compile Map</button>
    </div>

    <!-- AI FAB -->
    <div class="ai-fab" id="ai-fab">
        <i class="fas fa-robot"></i>
        <span>AI Copilot: 2 Scenarios detected</span>
    </div>

    <!-- Nodes Container -->
    <div id="nodes-container">
        <!-- Central Hub -->
        <div class="node node-hub" id="hub" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
            <div class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest mb-1">Central Net Worth</div>
            <div class="text-3xl font-black text-indigo-900 tracking-tighter">₹<span id="nw-val">0</span></div>
            <div class="mt-4 pt-4 border-t border-indigo-100 flex items-center justify-between">
                <div class="text-[10px] font-bold text-slate-400 uppercase">Health</div>
                <div class="w-20 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                    <div class="h-full bg-emerald-500" style="width: 85%;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Final View Clipping -->
    <div id="final-screen" class="clipping-path flex flex-col">
        <div class="bg-white p-12 rounded-[40px] shadow-2xl border border-slate-100 max-w-lg w-full text-center">
            <div class="w-20 h-20 rounded-3xl bg-emerald-50 text-emerald-500 flex items-center justify-center text-3xl mx-auto mb-8"><i class="fas fa-check-double"></i></div>
            <h2 class="text-3xl font-black mb-4">Topology Mapped.</h2>
            <p class="text-slate-500 mb-8 leading-relaxed">We've identified 3 Assets and 1 Liability. All double-entry linkages are consistent. Your private cloud is ready.</p>
            <div class="bg-slate-50 p-6 rounded-2xl mb-8 flex justify-between items-center text-left">
                <div>
                    <div class="text-[10px] font-bold text-slate-400 uppercase">Stabilized Worth</div>
                    <div class="text-2xl font-black" id="final-nw">₹0</div>
                </div>
                <i class="fas fa-shield-halved text-emerald-600"></i>
            </div>
            <button class="w-full bg-indigo-600 text-white py-5 rounded-3xl font-bold text-lg hover:shadow-2xl transition-all" onclick="location.reload()">Reset Map</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('nodes-container');
        const hub = document.getElementById('hub');
        const nwVal = document.getElementById('nw-val');
        
        let nodes = [
            { id: 'asset1', type: 'asset', label: 'HDFC Savings', val: 1200000, x: 300, y: 200 },
            { id: 'asset2', type: 'asset', label: 'House Portfolio', val: 8500000, x: 250, y: 500 },
            { id: 'liab1', type: 'liab', label: 'Home Loan', val: 3200000, x: 950, y: 400 }
        ];

        function renderNodes() {
            // Keep the hub in state
            const existingNodes = container.querySelectorAll('.node:not(#hub)');
            existingNodes.forEach(n => n.remove());
            const lines = document.querySelectorAll('.connection-line');
            lines.forEach(l => l.remove());

            nodes.forEach(node => {
                const el = document.createElement('div');
                el.className = `node node-${node.type}`;
                el.style.left = node.x + 'px';
                el.style.top = node.y + 'px';
                el.innerHTML = `
                    <div class="text-[9px] font-bold text-slate-400 uppercase mb-1">${node.type}</div>
                    <div class="font-bold text-sm mb-1 line-clamp-1">${node.label}</div>
                    <div class="text-lg font-black ${node.type === 'asset' ? 'text-emerald-600' : 'text-rose-500'}">₹${(node.val/100000).toFixed(1)}L</div>
                `;
                
                // Simple drag
                let isDragging = false;
                el.onmousedown = (e) => { isDragging = true; el.style.zIndex = 100; };
                window.onmousemove = (e) => {
                    if(!isDragging) return;
                    node.x = e.clientX - 90;
                    node.y = e.clientY - 40;
                    el.style.left = node.x + 'px';
                    el.style.top = node.y + 'px';
                    updateLines();
                };
                window.onmouseup = () => { isDragging = false; el.style.zIndex = 10; };

                container.appendChild(el);
            });

            calculateNW();
            updateLines();
        }

        function calculateNW() {
            let total = 0;
            nodes.forEach(n => {
                if(n.type === 'asset') total += n.val;
                else total -= n.val;
            });
            nwVal.innerText = total.toLocaleString('en-IN');
            document.getElementById('final-nw').innerText = '₹' + total.toLocaleString('en-IN');
        }

        function updateLines() {
            document.querySelectorAll('.connection-line').forEach(l => l.remove());
            const hubX = window.innerWidth / 2;
            const hubY = window.innerHeight / 2;

            nodes.forEach(node => {
                const line = document.createElement('div');
                line.className = 'connection-line';
                
                const dx = hubX - (node.x + 90);
                const dy = hubY - (node.y + 40);
                const dist = Math.sqrt(dx*dx + dy*dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;

                line.style.width = dist + 'px';
                line.style.left = (node.x + 90) + 'px';
                line.style.top = (node.y + 40) + 'px';
                line.style.transform = `rotate(${angle}deg)`;
                
                if (node.type === 'liab') line.style.background = '#fecaca'; // rose-200
                else line.style.background = '#bbf7d0'; // emerald-200

                document.body.appendChild(line);
            });
        }

        function addNode(type) {
            nodes.push({
                id: 'new' + Date.now(),
                type: type,
                label: type === 'asset' ? 'New Asset' : 'New Debt',
                val: 100000,
                x: 100,
                y: 100
            });
            renderNodes();
        }

        function finish() {
            document.getElementById('final-screen').style.display = 'flex';
        }

        window.onresize = () => renderNodes();
        renderNodes();
    </script>
</body>
</html>
